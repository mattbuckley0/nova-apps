<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Apps — Products that feel like magic</title>
    <meta name="description" content="Nova Apps builds beautiful, purposeful software. We craft apps that feel like magic.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --ink: #1a1a18;
            --ink-light: #6b6960;
            --accent: #2b5e49;
            --accent-warm: #c4713b;
            --border: #d4cfc4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(245, 240, 232, 0.8);
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent-warm);
            border-radius: 50%;
            top: 4px;
            right: -2px;
            filter: blur(4px);
            opacity: 0.9;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            position: relative;
            z-index: 1;
        }

        .nav-pill {
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 14px;
            text-decoration: none;
            color: var(--ink);
            transition: all 0.2s;
        }

        .nav-pill:hover {
            background: var(--ink);
            color: var(--cream);
            border-color: var(--ink);
        }

        /* ── HERO ── */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 140px 40px 80px;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: clamp(48px, 8vw, 96px);
            line-height: 1.05;
            letter-spacing: -0.03em;
            max-width: 900px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.2s;
        }

        h1 em {
            font-style: italic;
            color: var(--accent-warm);
            position: relative;
            z-index: 1;
            text-shadow:
                -3px 0 0 var(--cream),
                3px 0 0 var(--cream),
                0 -3px 0 var(--cream),
                0 3px 0 var(--cream),
                -2px -2px 0 var(--cream),
                2px -2px 0 var(--cream),
                -2px 2px 0 var(--cream),
                2px 2px 0 var(--cream);
        }

        .magic-wrap {
            position: relative;
            display: inline-block;
        }

        .hero-underline {
            position: absolute;
            bottom: 0px;
            z-index: -1;
            left: -4%;
            width: 108%;
            height: 14px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.35s;
        }

        /* ── WIDGET GALLERY ── */
        .gallery {
            padding: 20px 40px 100px;
            max-width: 960px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(200px, auto);
            gap: 16px;
        }

        .widget {
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
            cursor: default;
            min-height: 200px;
        }

        .widget h3 {
            font-family: 'DM Sans', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .widget p {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.75;
            position: relative;
            z-index: 1;
        }

        /* ── WIDGET ICON ── */
        .widget-icon {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.18);
            z-index: 1;
        }

        .widget-icon svg {
            width: 18px;
            height: 18px;
        }

        /* ── VILLAGE ── spans 2 cols, landscape, tree silhouettes */
        .w-village {
            grid-column: span 2;
            background: #2d5a3d;
            color: #f5f0e8;
            min-height: 240px;
        }
        .w-village::before {
            content: '';
            position: absolute;
            bottom: 0; right: 40px;
            width: 180px; height: 120px;
            background:
                radial-gradient(ellipse 30px 40px at 30px 80px, rgba(255,255,255,0.06) 100%, transparent 100%),
                radial-gradient(ellipse 40px 55px at 80px 65px, rgba(255,255,255,0.08) 100%, transparent 100%),
                radial-gradient(ellipse 25px 35px at 140px 85px, rgba(255,255,255,0.05) 100%, transparent 100%),
                radial-gradient(ellipse 35px 50px at 160px 70px, rgba(255,255,255,0.07) 100%, transparent 100%);
        }

        /* ── SPOTTED ── tall portrait card, scattered spots */
        .w-spotted {
            background: #c4713b;
            color: #f5f0e8;
            grid-row: span 2;
            min-height: 280px;
        }
        .w-spotted::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle 8px at 75% 20%, rgba(255,255,255,0.1) 100%, transparent 100%),
                radial-gradient(circle 5px at 85% 35%, rgba(255,255,255,0.08) 100%, transparent 100%),
                radial-gradient(circle 12px at 60% 15%, rgba(255,255,255,0.06) 100%, transparent 100%),
                radial-gradient(circle 6px at 90% 50%, rgba(255,255,255,0.1) 100%, transparent 100%),
                radial-gradient(circle 4px at 70% 45%, rgba(255,255,255,0.07) 100%, transparent 100%),
                radial-gradient(circle 9px at 80% 65%, rgba(255,255,255,0.05) 100%, transparent 100%),
                radial-gradient(circle 7px at 55% 30%, rgba(255,255,255,0.08) 100%, transparent 100%);
        }

        /* ── MARKER ── dark, waveform bars */
        .w-marker {
            background: #1c1c1c;
            color: #f5f0e8;
        }
        .w-marker::before {
            content: '';
            position: absolute;
            top: 50%; right: 24px;
            transform: translateY(-50%);
            width: 80px; height: 60px;
            background:
                linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.12) 100%) no-repeat 0px 20px / 4px 20px,
                linear-gradient(to bottom, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.08) 100%) no-repeat 10px 10px / 4px 40px,
                linear-gradient(to bottom, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.14) 100%) no-repeat 20px 5px / 4px 50px,
                linear-gradient(to bottom, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.10) 100%) no-repeat 30px 15px / 4px 30px,
                linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.12) 100%) no-repeat 40px 8px / 4px 44px,
                linear-gradient(to bottom, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.07) 100%) no-repeat 50px 18px / 4px 24px,
                linear-gradient(to bottom, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0.11) 100%) no-repeat 60px 12px / 4px 36px,
                linear-gradient(to bottom, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.09) 100%) no-repeat 70px 22px / 4px 16px;
        }

        /* ── SPAMMY ── red with struck-through envelope hint */
        .w-spammy {
            background: #f5f0e8;
            color: var(--ink);
            border: 2px solid #c45c5c;
        }
        .w-spammy .widget-icon { background: rgba(196,92,92,0.12); }
        .w-spammy .widget-icon svg { stroke: #c45c5c; }
        .w-spammy h3 { color: #8a2e2e; }
        .w-spammy::before {
            content: '';
            position: absolute;
            top: 50%; right: 28px;
            transform: translateY(-50%) rotate(-45deg);
            width: 48px; height: 3px;
            background: #c45c5c;
            opacity: 0.25;
            border-radius: 2px;
        }
        .w-spammy::after {
            content: '';
            position: absolute;
            top: 50%; right: 28px;
            transform: translateY(-50%) rotate(45deg);
            width: 48px; height: 3px;
            background: #c45c5c;
            opacity: 0.25;
            border-radius: 2px;
        }

        /* ── BRAINRANK ── deep indigo with grid dots */
        .w-brainrank {
            background: #2a2d52;
            color: #f5f0e8;
        }
        .w-brainrank::before {
            content: '';
            position: absolute;
            top: 16px; right: 16px;
            width: 72px; height: 72px;
            background-image: radial-gradient(circle 2px at center, rgba(255,255,255,0.15) 100%, transparent 100%);
            background-size: 12px 12px;
        }

        /* ── SOJI ── teal, spans 2 cols, concentric ripples */
        .w-soji {
            grid-column: span 2;
            background: #4a7278;
            color: #f5f0e8;
        }
        .w-soji::before {
            content: '';
            position: absolute;
            top: 50%; right: 60px;
            transform: translateY(-50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.08);
            box-shadow:
                0 0 0 16px rgba(255,255,255,0.05),
                0 0 0 32px rgba(255,255,255,0.03),
                0 0 0 48px rgba(255,255,255,0.015);
        }

        /* ── FOOTER ── */
        footer {
            padding: 48px 40px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            margin-bottom: 12px;
        }

        footer p {
            font-size: 13px;
            color: var(--ink-light);
            font-weight: 300;
        }

        footer a {
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover { color: var(--ink); }

        .footer-links {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 12px;
        }

        /* ── KEYFRAMES ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            .hero { padding: 100px 24px 48px; }
            .gallery { padding: 24px 20px 80px; }
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
            }
            .w-village,
            .w-soji { grid-column: span 2; }
            .w-spotted { grid-row: span 1; }
            footer { padding: 32px 24px; }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .w-village,
            .w-soji { grid-column: auto; }
            .w-spotted { grid-row: auto; }
            .widget { min-height: 180px; }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav>
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round">
                    <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z"/>
                    <path d="M12 12L20 7.5"/>
                    <path d="M12 12V21"/>
                    <path d="M12 12L4 7.5"/>
                </svg>
            </div>
            Nova Apps
        </div>
        <a href="mailto:hello@getnovaapps.com" class="nav-pill">Get in Touch</a>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>
            Products that<br>feel like <em><span class="magic-wrap">magic.<svg class="hero-underline" viewBox="0 0 200 14" fill="none" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 8C18 4 42 3 68 7C94 11 120 4 146 6C164 7 182 9 198 8" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" opacity="0.5"/><path d="M4 9C22 5 46 4 72 8C98 12 124 5 150 7C168 8 186 10 198 9" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/><path d="M6 7.5C24 4 48 5 74 9C100 10 126 5.5 152 7C170 8 188 9.5 198 8.5" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" opacity="0.2"/></svg></span></em>
        </h1>
    </section>

    <!-- WIDGET GALLERY -->
    <div class="gallery">
        <div class="gallery-grid">
            <div class="widget w-village">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <h3>Village</h3>
                <p>Activities for kids</p>
            </div>

            <div class="widget w-spotted">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </div>
                <h3>Spotted</h3>
                <p>Gamified bug reporting</p>
            </div>

            <div class="widget w-marker">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <h3>Marker</h3>
                <p>AI transcription</p>
            </div>

            <div class="widget w-spammy">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <h3>Spammy</h3>
                <p>Kill your junk mail</p>
            </div>

            <div class="widget w-brainrank">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.5 2a6.5 6.5 0 000 13h.5v5a2 2 0 004 0v-5h.5a6.5 6.5 0 000-13"/>
                        <path d="M12 2v6"/>
                    </svg>
                </div>
                <h3>BrainRank</h3>
                <p>Test your IQ</p>
            </div>

            <div class="widget w-soji">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 17.5c0 2.5 2.2 4.5 5 4.5s5-2 5-4.5c0-3.5-5-6.5-5-6.5s-5 3-5 6.5z"/>
                        <path d="M12 2v9"/>
                        <path d="M8 5l4 3 4-3"/>
                    </svg>
                </div>
                <h3>Soji</h3>
                <p>Japanese wellness rinse</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Nova Apps</div>
        <p>&copy; 2026 Nova Apps LLC</p>
        <div class="footer-links">
            <a href="mailto:hello@getnovaapps.com">hello@getnovaapps.com</a>
        </div>
    </footer>
</body>
</html>
