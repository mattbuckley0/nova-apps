<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Apps — Products that feel like magic</title>
    <meta name="description" content="Nova Apps builds beautiful, purposeful software. We craft apps that feel like magic.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --ink: #1a1a18;
            --ink-light: #6b6960;
            --accent: #2b5e49;
            --accent-warm: #c4713b;
            --border: #d4cfc4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(245, 240, 232, 0.8);
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent-warm);
            border-radius: 50%;
            top: 4px;
            right: -2px;
            filter: blur(4px);
            opacity: 0.9;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            position: relative;
            z-index: 1;
        }

        .nav-pill {
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 14px;
            text-decoration: none;
            color: var(--ink);
            transition: all 0.2s;
        }

        .nav-pill:hover {
            background: var(--ink);
            color: var(--cream);
            border-color: var(--ink);
        }

        /* ── HERO ── */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 140px 40px 80px;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: clamp(48px, 8vw, 96px);
            line-height: 1.05;
            letter-spacing: -0.03em;
            max-width: 900px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.2s;
        }

        h1 em {
            font-style: italic;
            color: var(--accent-warm);
            position: relative;
            z-index: 1;
            text-shadow:
                -3px 0 0 var(--cream),
                3px 0 0 var(--cream),
                0 -3px 0 var(--cream),
                0 3px 0 var(--cream),
                -2px -2px 0 var(--cream),
                2px -2px 0 var(--cream),
                -2px 2px 0 var(--cream),
                2px 2px 0 var(--cream);
        }

        .magic-wrap {
            position: relative;
            display: inline-block;
        }

        .hero-underline {
            position: absolute;
            bottom: 0px;
            z-index: -1;
            left: -4%;
            width: 108%;
            height: 14px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.35s;
        }

        /* ── WIDGET GALLERY ── */
        .gallery {
            padding: 20px 40px 100px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
        }

        .widget {
            aspect-ratio: 1;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .widget:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 24px 48px rgba(26,26,24,0.15);
        }

        .widget h3 {
            font-family: 'DM Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 2px;
        }

        .widget p {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.75;
        }

        /* ── WIDGET ICON ── */
        .widget-icon {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
        }

        .widget-icon svg {
            width: 16px;
            height: 16px;
        }

        /* ── INDIVIDUAL WIDGETS ── */
        .w-village {
            background: linear-gradient(145deg, #4a7c59, #2d5a3d);
            color: #f5f0e8;
        }

        .w-spotted {
            background: linear-gradient(145deg, #d4945e, #c4713b);
            color: #f5f0e8;
        }

        .w-marker {
            background: linear-gradient(145deg, #6b5a4e, #3d2e22);
            color: #f5f0e8;
        }

        .w-spammy {
            background: linear-gradient(145deg, #c45c5c, #8a2e2e);
            color: #f5f0e8;
        }

        .w-brainrank {
            background: linear-gradient(145deg, #5a5e8c, #333660);
            color: #f5f0e8;
        }

        .w-soji {
            background: linear-gradient(145deg, #7ca3a8, #4a7278);
            color: #f5f0e8;
        }

        /* staggered reveal */
        .widget {
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }
        .widget:nth-child(1) { animation-delay: 0.5s; }
        .widget:nth-child(2) { animation-delay: 0.6s; }
        .widget:nth-child(3) { animation-delay: 0.7s; }
        .widget:nth-child(4) { animation-delay: 0.8s; }
        .widget:nth-child(5) { animation-delay: 0.9s; }
        .widget:nth-child(6) { animation-delay: 1.0s; }

        /* ── FOOTER ── */
        footer {
            padding: 48px 40px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            margin-bottom: 12px;
        }

        footer p {
            font-size: 13px;
            color: var(--ink-light);
            font-weight: 300;
        }

        footer a {
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover { color: var(--ink); }

        .footer-links {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 12px;
        }

        /* ── KEYFRAMES ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            .hero { padding: 100px 24px 48px; }
            .gallery { padding: 24px 24px 80px; }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            footer { padding: 32px 24px; }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav>
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round">
                    <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z"/>
                    <path d="M12 12L20 7.5"/>
                    <path d="M12 12V21"/>
                    <path d="M12 12L4 7.5"/>
                </svg>
            </div>
            Nova Apps
        </div>
        <a href="mailto:hello@getnovaapps.com" class="nav-pill">Get in Touch</a>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>
            Products that<br>feel like <em><span class="magic-wrap">magic.<svg class="hero-underline" viewBox="0 0 200 14" fill="none" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 8C18 4 42 3 68 7C94 11 120 4 146 6C164 7 182 9 198 8" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" opacity="0.5"/><path d="M4 9C22 5 46 4 72 8C98 12 124 5 150 7C168 8 186 10 198 9" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/><path d="M6 7.5C24 4 48 5 74 9C100 10 126 5.5 152 7C170 8 188 9.5 198 8.5" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" opacity="0.2"/></svg></span></em>
        </h1>
    </section>

    <!-- WIDGET GALLERY -->
    <div class="gallery">
        <div class="gallery-grid">
            <div class="widget w-village">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <h3>Village</h3>
                <p>Family activities platform</p>
            </div>

            <div class="widget w-spotted">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </div>
                <h3>Spotted</h3>
                <p>Gamified bug reporting</p>
            </div>

            <div class="widget w-marker">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <h3>Marker</h3>
                <p>AI-powered transcription</p>
            </div>

            <div class="widget w-spammy">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <h3>Spammy</h3>
                <p>Kill your junk mail</p>
            </div>

            <div class="widget w-brainrank">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.5 2a6.5 6.5 0 000 13h.5v5a2 2 0 004 0v-5h.5a6.5 6.5 0 000-13"/>
                        <path d="M12 2v6"/>
                    </svg>
                </div>
                <h3>BrainRank</h3>
                <p>Test your IQ</p>
            </div>

            <div class="widget w-soji">
                <div class="widget-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 17.5c0 2.5 2.2 4.5 5 4.5s5-2 5-4.5c0-3.5-5-6.5-5-6.5s-5 3-5 6.5z"/>
                        <path d="M12 2v9"/>
                        <path d="M8 5l4 3 4-3"/>
                    </svg>
                </div>
                <h3>Soji</h3>
                <p>Japanese wellness rinse</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Nova Apps</div>
        <p>&copy; 2026 Nova Apps LLC</p>
        <div class="footer-links">
            <a href="mailto:hello@getnovaapps.com">hello@getnovaapps.com</a>
        </div>
    </footer>
</body>
</html>
